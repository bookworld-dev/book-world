name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/364750689185/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: github-actions@bookworld-283512.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet

      - name: Read build-time secrets
        run: |
          NEXT_PUBLIC_MAPBOX_TOKEN=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_MAPBOX_TOKEN --project=bookworld-283512)
          echo "NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COVER_STORAGE_URL=https://storage.googleapis.com/bookworld-283512-covers" >> $GITHUB_ENV

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 \
            --build-arg "NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}" \
            --build-arg "NEXT_PUBLIC_COVER_STORAGE_URL=${NEXT_PUBLIC_COVER_STORAGE_URL}" \
            -t europe-west2-docker.pkg.dev/bookworld-283512/book-world/app:${{ github.sha }} \
            -t europe-west2-docker.pkg.dev/bookworld-283512/book-world/app:latest \
            .
          docker push europe-west2-docker.pkg.dev/bookworld-283512/book-world/app:${{ github.sha }}
          docker push europe-west2-docker.pkg.dev/bookworld-283512/book-world/app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy book-world \
            --image europe-west2-docker.pkg.dev/bookworld-283512/book-world/app:${{ github.sha }} \
            --region europe-west2 \
            --project bookworld-283512
